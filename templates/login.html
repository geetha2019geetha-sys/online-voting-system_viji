<!DOCTYPE html>
<html>

<head>
    <title>Online Voting Login</title>

    <style>

        body{
            margin:0;
            font-family:Arial;

            /* ✅ BACKGROUND IMAGE KEPT */
            background-image:url("https://i.postimg.cc/FYDyydPG/loginbg.jpg");
            background-size:cover;
            background-position:center;
            background-repeat:no-repeat;
            height:100vh;

            display:flex;
            justify-content:flex-end;
            align-items:center;
            padding-right:80px;
        }

        /* 🔝 TOP RIGHT MENU BAR */
        .top-menu{
            position:absolute;
            top:20px;
            right:40px;
        }

        /* ✅ TRANSPARENT BUTTONS */
        .top-menu a{
            text-decoration:none;
            background:transparent;     /* Removed white */
            color:white;                /* Text white */
            padding:8px 18px;
            margin-left:10px;
            border-radius:20px;
            font-size:14px;
            font-weight:bold;
            border:2px solid white;    /* White border */
            transition:0.3s;
        }

        /* HOVER EFFECT */
        .top-menu a:hover{
            background:white;
            color:#2d6cdf;
        }

        /* LOGIN BOX */
        .login-box{
            background:transparent;
            padding:40px;
            width:350px;
            border-radius:15px;
            text-align:center;
            backdrop-filter:blur(6px);
        }

        h2{
            margin-bottom:20px;
            color:#000;
        }

        input{
            width:100%;
            padding:10px;
            margin:10px 0;
            border-radius:20px;
            border:1px solid #ccc;
            outline:none;
        }

        button{
            background:#2d6cdf;
            color:white;
            padding:10px 25px;
            border:none;
            border-radius:20px;
            cursor:pointer;
            font-size:16px;
        }

        button:hover{
            background:#1b4fbf;
        }

    </style>
</head>

<body>

    <!-- 🔝 TOP RIGHT BUTTONS -->
    <div class="top-menu">
        <a href="/">Home</a>
        <a href="/service">Service</a>
        <a href="/manifesto">Party Manifesto</a>
        <a href="/about">About</a>
    </div>
    <!--background-->
    <a href='https://postimg.cc/FYDyydPG' target='_blank'>
        <img src='https://i.postimg.cc/FYDyydPG/loginbg.jpg' border='0' alt='loginbg'></a>

    <!-- LOGIN BOX -->
    <div class="login-box">

        <h2>Enter Voter Card Number</h2>

        <form method="POST">

            <label>Voter ID:</label><br>
            <input type="text" name="username" required><br>

            <label>Password:</label><br>
            <input type="password" name="password" required><br><br>

            <button type="submit">Login</button>

        </form>

        <br>

<p>Admin login</p>

<!-- REGISTER BUTTON -->
<a href="/register" class="register-btn">Register</a>

    </div>

</body>
</html>
